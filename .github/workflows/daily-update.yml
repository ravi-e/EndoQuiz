name: Daily Question Bank Update

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  generate-questions:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install google-genai huggingface_hub Pillow

      - name: Generate new questions
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DISABLE_TELEMETRY: 1
          HF_HUB_DISABLE_PROGRESS_BARS: 1
        run: python -u generate.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # Check if there are any changes to questions.json or images/
          if git diff --quiet questions.json && git status --porcelain images/ | grep -q '^\s*$'; then
            echo "No new questions or images to commit."
          else
            git add questions.json images/
            git commit -m "Auto-generated new questions and clinical assets [skip ci]"
            git push
            echo "Successfully committed new questions and clinical assets."
          fi
